<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Portfolio Editor</h1>
  <a href="gallery.html">View Gallery</a>
</header>

<div class="editor-layout">

  <form id="portfolioForm" class="editor-form">
    <h2>Edit Portfolio</h2>

    <input name="full_name" placeholder="Full Name" oninput="livePreview()">
    <input name="title" placeholder="Professional Title" oninput="livePreview()">
    <textarea name="about" placeholder="About You" oninput="livePreview()"></textarea>
    <textarea name="skills" placeholder="Skills: HTML, CSS, JS" oninput="livePreview()"></textarea>
    <textarea name="projects" placeholder="Projects" oninput="livePreview()"></textarea>
    <input name="github" placeholder="GitHub Link">
    <input name="linkedin" placeholder="LinkedIn Link">

    <select name="theme" onchange="livePreview()">
      <option value="minimal">Minimal</option>
      <option value="developer">Developer</option>
      <option value="creative">Creative</option>
    </select>

    <input type="file" name="photo">

    <button type="submit">Publish Portfolio</button>
  </form>

  <div class="preview-card" id="preview">
    <h2>Your Name</h2>
    <h3>Your Title</h3>
    <p>Your about section will appear here.</p>
    <p><b>Skills:</b> HTML, CSS, JavaScript</p>
    <p><b>Projects:</b> Your projects here</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
